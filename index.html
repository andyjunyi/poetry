<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詩詞智能文庫 · 古韻閱讀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e2d9cd; font-family: 'Segoe UI', '微軟正黑體', 'KaiTi', '華文楷書', serif; padding: 1.5rem; }
        .app-wrapper { max-width: 1400px; margin: 0 auto; background: #fffdf7; border-radius: 2rem; overflow: hidden; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2); }
        
        /* 頁首 */
        .header { background: #2d241b; color: #f2e5d2; padding: 1.2rem 2rem; }
        .header h1 { font-size: 1.8rem; letter-spacing: 2px; font-weight: 500; }
        
        /* 智能貼上區 */
        .smart-zone { background: #f8f2e6; margin: 1.2rem 1.8rem; border-radius: 32px; padding: 1.2rem; border: 1px solid #e2cfac; }
        textarea { width: 100%; padding: 1rem; border-radius: 24px; border: 1px solid #ddcaa5; font-family: monospace; background: #fffef8; font-size: 0.9rem; }
        .btn-parse { background: #7b583c; color: white; padding: 0.6rem 1.5rem; border-radius: 40px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-parse:hover { background: #5f3f28; transform: scale(0.97); }
        
        /* 工具列 */
        .toolbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 0.8rem 1.8rem; gap: 12px; background: #fefaf2; border-top: 1px solid #e8dbc2; border-bottom: 1px solid #e8dbc2; }
        .search-area { display: flex; gap: 0.5rem; flex: 2; flex-wrap: wrap; }
        .search-area input { flex: 2; padding: 0.5rem 1rem; border-radius: 60px; border: 1px solid #cfb889; background: white; font-family: inherit; }
        .search-area select, .search-area button { padding: 0.5rem 1rem; border-radius: 60px; border: none; background: #e5d5bc; cursor: pointer; font-family: inherit; }
        .search-area button { background: #9b7b58; color: white; }
        .work-count { background: #e9ddcc; padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.85rem; }
        
        /* 左右面板 */
        .dual-panel { display: flex; flex-wrap: wrap; }
        .sidebar { flex: 1.2; min-width: 270px; background: #fef9f0; padding: 1.2rem; border-right: 1px solid #e7dcc8; }
        .sidebar h3 { border-left: 5px solid #b47c44; padding-left: 12px; margin-bottom: 1rem; color: #4a341d; }
        .work-list { list-style: none; max-height: 550px; overflow-y: auto; }
        .work-list li { padding: 0.7rem 0.8rem; border-bottom: 1px dashed #e2cfb0; cursor: pointer; border-radius: 12px; transition: all 0.1s; display: flex; align-items: center; justify-content: space-between; }
        .work-list li:hover { background: #eadfcb; transform: translateX(4px); }
        .active-work { background: #e5d7c0; border-left: 4px solid #aa703e; }
        .work-title { font-weight: 600; font-size: 1rem; }
        .work-author { font-size: 0.7rem; color: #876e4a; margin-top: 3px; }
        
        /* ========= 作品正文區塊：古詩氛圍優化 ========= */
        .content-area { flex: 3; padding: 2rem 2rem; background: #fefaf3; }
        .detail-card { animation: fade 0.25s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 作品標題區 */
        .poem-header {
            border-bottom: 2px solid #dac29c;
            padding-bottom: 0.8rem;
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .poem-title-main {
            font-size: 2rem;
            font-weight: 500;
            color: #4f321b;
            letter-spacing: 3px;
            font-family: '華文楷書', 'KaiTi', 'Georgia', serif;
            text-shadow: 1px 1px 0 rgba(180, 130, 70, 0.15);
        }
        .poem-author-main {
            font-size: 1rem;
            color: #8f6b42;
            font-style: italic;
            background: #f2e9dd;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }
        
        /* ★ 詩詞正文區：更大字距、寬鬆行距、古雅字體 ★ */
        .poem-block {
            background: #fffaf0;
            padding: 2rem 2.2rem;
            border-radius: 28px;
            border-left: 6px solid #bc8b58;
            border-right: 1px solid #f0e2cf;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            margin: 1.5rem 0;
            /* 古詩閱讀專屬設定 */
            font-family: '華文楷書', 'KaiTi', 'Georgia', 'Times New Roman', serif;
            font-size: 1.35rem;
            line-height: 2.2;          /* 寬鬆行距，舒適閱讀 */
            letter-spacing: 0.03em;    /* 微微字距，更有古典韻味 */
            white-space: pre-line;
            word-break: break-word;
            color: #2b2a27;
            text-align: left;
            font-weight: normal;
        }
        
        /* 讓詞句換行更自然，段落間距增加 */
        .poem-block br {
            display: block;
            margin: 0.4rem 0;
            content: "";
        }
        
        /* 賞析區塊保留清晰但稍帶古風 */
        .analysis-block {
            background: #fef7eb;
            padding: 1.3rem 1.8rem;
            border-radius: 28px;
            margin-top: 1.8rem;
            border: 1px solid #eedfc6;
            font-size: 0.98rem;
            line-height: 1.7;
            color: #3f3324;
        }
        .analysis-block strong {
            font-size: 1.05rem;
            color: #7b5a3a;
            display: inline-block;
            border-left: 3px solid #bc8b58;
            padding-left: 10px;
            margin-bottom: 0.7rem;
        }
        
        /* 小提示 */
        .poem-note {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #b2916b;
            text-align: right;
            border-top: 1px dashed #eadbc2;
            padding-top: 0.8rem;
        }
        
        footer { text-align: center; background: #efe3d2; padding: 0.8rem; font-size: 0.7rem; color: #5c4630; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: #fffaf0; max-width: 400px; padding: 1.5rem; border-radius: 32px; text-align: center; font-family: 'Segoe UI', 'KaiTi', serif; }
        button { cursor: pointer; transition: 0.1s; }
        
        @media (max-width: 700px) {
            .poem-block { font-size: 1.1rem; line-height: 1.9; padding: 1rem 1.2rem; }
            .poem-title-main { font-size: 1.5rem; }
            .content-area { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="header"><h1>📖 詩詞智能文庫 · 古韻閱讀</h1></div>
    <div class="smart-zone">
        <textarea id="rawTextInput" rows="3" placeholder="直接貼上詩詞內容，系統自動識別標題、作者、正文、賞析…&#10;例如：&#10;如夢令·昨夜雨疏風驟&#10;〔宋〕李清照&#10;昨夜雨疏風驟，濃睡不消殘酒。試問卷簾人，卻道海棠依舊。知否，知否？應是綠肥紅瘦。&#10;賞析：此詞以「綠肥紅瘦」寫盡惜春之情……"></textarea>
        <div class="button-group" style="margin-top:1rem; text-align:right;"><button class="btn-parse" id="smartParseBtn">✨ 智能分析並新增</button></div>
    </div>
    <div class="toolbar">
        <div class="search-area">
            <input type="text" id="searchKeyword" placeholder="搜尋作品名稱或作者...">
            <select id="searchMode"><option value="all">綜合</option><option value="title">按名稱</option><option value="author">按作者</option></select>
            <button id="searchBtn">🔍 檢索</button>
            <button id="resetBtn">⟳ 重置</button>
        </div>
        <div class="work-count">📚 作品數: <span id="workCount">0</span></div>
    </div>
    <div class="dual-panel">
        <div class="sidebar"><h3>📜 作品目錄</h3><ul class="work-list" id="workList"><li>載入中...</li></ul></div>
        <div class="content-area" id="contentArea"><div style="text-align:center; padding:3rem; color:#aa8b64;">✨ 請選擇作品，或使用智能貼上新增詩詞<br>⋆ 正文區採用古雅字體、寬鬆行距 ⋆</div></div>
    </div>
    <footer>⚡ 智能解析引擎 · 自動提取作者／作品／賞析｜正文區加大行距字距，仿古書卷氣息</footer>
</div>
<div id="toastModal" class="modal"><div class="modal-card"><p id="toastMsg"></p><button id="closeToast" style="margin-top:1rem; padding:0.4rem 1rem; background:#b28654; border:none; border-radius:30px; color:white;">確定</button></div></div>

<script>
    // ---------- 詩詞資料庫 (內建兩首繁體賞析，正文已用古雅風格) ----------
    let poetryDatabase = [
        { id: "p1", title: "聲聲慢·尋尋覓覓", author: "李清照", 
          content: `尋尋覓覓，冷冷清清，淒淒慘慘戚戚。
乍暖還寒時候，最難將息。
三杯兩盞淡酒，怎敵他、晚來風急！
雁過也，正傷心，卻是舊時相識。

滿地黃花堆積，憔悴損，如今有誰堪摘？
守著窗兒，獨自怎生得黑！
梧桐更兼細雨，到黃昏、點點滴滴。
這次第，怎一個愁字了得！`, 
          analysis: `【賞析】開篇七組疊字「尋尋覓覓，冷冷清清，淒淒慘慘戚戚」被譽為空前絕後之奇筆。由動作至環境、再至心境層層遞進，將無邊愁苦錘煉為天籟節奏。全詞以淡酒、過雁、黃花、梧桐細雨等意象鋪陳愁緒，結尾「怎一個愁字了得」以反問收束，將國破家亡之痛、孤苦飄零之悲凝聚為寫愁巔峰之作。` 
        },
        { id: "p2", title: "如夢令·昨夜雨疏風驟", author: "李清照", 
          content: `昨夜雨疏風驟，濃睡不消殘酒。
試問卷簾人，卻道海棠依舊。
知否，知否？應是綠肥紅瘦。`, 
          analysis: `【賞析】此詞為李清照前期名篇，借宿酒醒後詢問花事，委婉惜春。「綠肥紅瘦」四字極煉如不煉，以色彩形態寫盡春光消逝之嘆，含蓄蘊藉，千古傳誦。全詞輕靈新巧，卻寄寓對美好事物易逝的深刻感懷。` 
        }
    ];
    let currentSelectedId = "p1";
    
    // 輔助函式
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;': m==='<'?'&lt;':'&gt;';}); }
    
    function renderWorkList(works) {
        const container = document.getElementById('workList');
        if(!works.length){ container.innerHTML='<li style="justify-content:center;">📭 暫無作品</li>'; return; }
        container.innerHTML = '';
        works.forEach(work => {
            const li = document.createElement('li');
            li.className = currentSelectedId === work.id ? 'active-work' : '';
            li.innerHTML = `<div style="flex:1"><div class="work-title">📖 ${escapeHtml(work.title)}</div><div class="work-author">✍️ ${escapeHtml(work.author)}</div></div><span style="opacity:0.6;">📌</span>`;
            li.onclick = () => { currentSelectedId = work.id; renderWorkList(works); showDetail(work.id); };
            container.appendChild(li);
        });
        document.getElementById('workCount').innerText = poetryDatabase.length;
    }
    
    // ★★★★★ 重點：作品正文區塊採用新版古雅樣式（較大字體、行距2.2、字距增加）★★★★★
    function showDetail(id) {
        const work = poetryDatabase.find(w=>w.id===id);
        if(!work) return;
        // 保留原文換行樣式，直接以 poem-block 呈現
        const formattedContent = escapeHtml(work.content).replace(/\n/g, '<br>');
        const formattedAnalysis = escapeHtml(work.analysis).replace(/\n/g, '<br>');
        const detailHtml = `
            <div class="detail-card">
                <div class="poem-header">
                    <span class="poem-title-main">${escapeHtml(work.title)}</span>
                    <span class="poem-author-main">${escapeHtml(work.author)}</span>
                </div>
                <div class="poem-block">${formattedContent}</div>
                <div class="analysis-block">
                    <strong>📜 作品賞析 · 意蘊品讀</strong><br>
                    <div style="margin-top: 0.5rem;">${formattedAnalysis}</div>
                </div>
                <div class="poem-note">✍️ ｜ 字裡行間，古韻悠然 ｜ 行距疏朗，宜品宜誦</div>
            </div>
        `;
        document.getElementById('contentArea').innerHTML = detailHtml;
    }
    
    function showToast(msg) {
        const modal = document.getElementById('toastModal');
        document.getElementById('toastMsg').innerText = msg;
        modal.style.display = 'flex';
        document.getElementById('closeToast').onclick = () => modal.style.display = 'none';
        setTimeout(() => { if(modal.style.display === 'flex') modal.style.display = 'none'; }, 2000);
    }
    
    // 智能解析函式（繁體優化，自動提取標題、作者、正文、賞析）
    function smartParseAndAdd(rawText) {
        if(!rawText.trim()) { showToast("請貼上有效內容"); return false; }
        let lines = rawText.split(/\r?\n/);
        let title = "未命名", author = "佚名", content = "", analysis = "";
        
        // 提取標題：含有「·」或書名號
        for(let line of lines) {
            let trimmed = line.trim();
            if(trimmed && (trimmed.includes("·") || trimmed.includes("《") || trimmed.includes("【")) && title === "未命名") {
                title = trimmed.replace(/[《》【】]/g, '').substring(0, 70);
                break;
            }
        }
        if(title === "未命名" && lines[0]) title = lines[0].trim().substring(0, 60);
        if(title === "未命名") title = "詩詞佳作";
        
        // 提取作者：朝代+人名 或 作者：某某
        for(let i=0; i<lines.length; i++) {
            let line = lines[i].trim();
            let match = line.match(/[〔\[（【]?\s*([^\]\)）】]{2,6})[\]\)）】]?\s*[唐宋明清]/);
            if(match && match[1]) { author = match[1].trim(); break; }
            let authorMatch = line.match(/作者[：:]\s*(\S+)/);
            if(authorMatch) { author = authorMatch[1]; break; }
            if(line.match(/〔(.+?)〕/) && line.length<20) {
                let m = line.match(/〔(.+?)〕/);
                if(m) { author = m[1]; break; }
            }
        }
        if(author === "佚名" && title.includes("·")) {
            let parts = title.split("·");
            if(parts.length>=2 && parts[0].length<=6) author = parts[0];
        }
        
        // 分離正文與賞析
        let isAnalysis = false;
        for(let line of lines) {
            let trimmed = line.trim();
            if(!isAnalysis && (trimmed.includes("賞析") || trimmed.includes("【賞析】") || trimmed.includes("簡析") || trimmed.includes("作品賞析"))) {
                isAnalysis = true;
                if(trimmed.length < 25) continue;
            }
            if(isAnalysis) {
                analysis += line + "\n";
            } else {
                if(!trimmed.includes(title) && !trimmed.includes(author) && trimmed !== "" && !(title !== "未命名" && trimmed === title))
                    content += line + "\n";
            }
        }
        content = content.trim() || "（原文待錄入）";
        analysis = analysis.trim() || "（暫無賞析，可自行補充）";
        
        const newId = "id_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
        poetryDatabase.push({ id: newId, title: title, author: author, content: content, analysis: analysis });
        resetAndDisplay();
        currentSelectedId = newId;
        renderWorkList([...poetryDatabase]);
        showDetail(newId);
        showToast(`✅ 成功收錄：《${title}》 · ${author}`);
        return true;
    }
    
    function resetAndDisplay() {
        document.getElementById('searchKeyword').value = '';
        renderWorkList([...poetryDatabase]);
        if(poetryDatabase.length) showDetail(currentSelectedId);
        else document.getElementById('contentArea').innerHTML = '<div style="text-align:center; padding:2rem;">✨ 暫無作品，請使用智能貼上新增詩詞</div>';
    }
    
    function performSearch() {
        let kw = document.getElementById('searchKeyword').value.trim().toLowerCase();
        let mode = document.getElementById('searchMode').value;
        if(!kw) { renderWorkList([...poetryDatabase]); return; }
        let filtered = poetryDatabase.filter(w => {
            if(mode === 'title') return w.title.toLowerCase().includes(kw);
            if(mode === 'author') return w.author.toLowerCase().includes(kw);
            return w.title.toLowerCase().includes(kw) || w.author.toLowerCase().includes(kw);
        });
        renderWorkList(filtered);
        if(filtered.length) showDetail(filtered[0].id);
        else document.getElementById('contentArea').innerHTML = '<div style="text-align:center; padding:2rem; color:#9b7b58;">🔍 查無相關作品，請嘗試其他關鍵字</div>';
    }
    
    // 事件綁定
    document.getElementById('smartParseBtn').onclick = () => {
        const rawVal = document.getElementById('rawTextInput').value;
        if(smartParseAndAdd(rawVal)) document.getElementById('rawTextInput').value = '';
    };
    document.getElementById('searchBtn').onclick = performSearch;
    document.getElementById('resetBtn').onclick = resetAndDisplay;
    document.getElementById('searchKeyword').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };
    
    // 初始化
    resetAndDisplay();
</script>
</body>
</html>
